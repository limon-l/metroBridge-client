<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" rx="8" fill="#863bff"/>
  
  <!-- Train/Metro icon -->
  <g transform="translate(32, 32)">
    <!-- Track lines -->
    <line x1="-20" y1="12" x2="20" y2="12" stroke="#ede6ff" stroke-width="2" opacity="0.4"/>
    <line x1="-20" y1="16" x2="20" y2="16" stroke="#ede6ff" stroke-width="2" opacity="0.4"/>
    
    <!-- Train car body -->
    <rect x="-18" y="-12" width="36" height="16" rx="2" fill="#ede6ff"/>
    
    <!-- Train windows -->
    <rect x="-14" y="-8" width="6" height="6" rx="1" fill="#863bff" opacity="0.8"/>
    <rect x="-4" y="-8" width="6" height="6" rx="1" fill="#863bff" opacity="0.8"/>
    <rect x="6" y="-8" width="6" height="6" rx="1" fill="#863bff" opacity="0.8"/>
    
    <!-- Train front connector -->
    <circle cx="-18" cy="0" r="2" fill="#47bfff"/>
    <circle cx="18" cy="0" r="2" fill="#47bfff"/>
    
    <!-- Wheels -->
    <circle cx="-12" cy="14" r="3" fill="#47bfff"/>
    <circle cx="0" cy="14" r="3" fill="#47bfff"/>
    <circle cx="12" cy="14" r="3" fill="#47bfff"/>
  </g>
</svg>